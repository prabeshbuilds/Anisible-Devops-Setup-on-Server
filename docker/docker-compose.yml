version: "3.9"

services:

  nodejs-app:
    build: ./node-app
    ports:
      - "3000:3000"

  python-app:
    build: ./python-app
    ports:
      - "5000:5000"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: devopsdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: